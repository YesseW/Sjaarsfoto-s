<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Foto & Naam</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="phone-shell app" aria-live="polite">
      <header class="brand-bar">
        <div class="brand-copy"><span class="brand-kicker">NSE</span><strong>Foto & Naam</strong></div>
        <a class="brand-action" href="beheer.html">Beheer</a>
        <div class="logo-card"><img class="brand-logo" src="assets/logo-nse.png" alt="NSE logo"></div>
      </header>

      <section id="startScreen" class="start-screen screen-panel">
        <div class="start-panel">
          <p class="eyebrow">Presentatie</p>
          <h1>Foto & Naam</h1>
          <form id="presenterForm" class="presenter-form">
            <label for="presenterName">Naam presentator</label>
            <div class="presenter-row">
              <input id="presenterName" name="presenterName" autocomplete="name" placeholder="Bijv. Sam" required>
              <button type="submit">Start</button>
            </div>
          </form>
        </div>
      </section>

      <section id="emptyScreen" class="empty-screen screen-panel" hidden>
        <div class="start-panel">
          <p class="eyebrow">Nog niets toegevoegd</p>
          <h1>Geen foto's</h1>
          <p class="helper-text">Voeg eerst namen en foto's toe in beheer.</p>
          <a class="primary-link" href="beheer.html">Naar beheer</a>
        </div>
      </section>

      <section id="quizScreen" class="quiz-screen screen-panel" hidden>
        <div class="presenter-meta">
          <div>
            <p class="eyebrow">Presentator</p>
            <p id="presenterLabel" class="presenter-label"></p>
          </div>
          <button id="restartButton" class="ghost-button" type="button">Wissel</button>
        </div>

        <button id="stage" class="stage" type="button" aria-label="Tik om verder te gaan">
          <img id="personPhoto" alt="">
          <div id="namePlate" class="name-plate"></div>
        </button>

        <footer class="controls">
          <p id="progressLabel" class="progress-label"></p>
          <button id="nextButton" class="next-button" type="button" hidden>Volgende foto</button>
        </footer>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
